<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Humanity Progression Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 220px;
  background: #020617;
  border-right: 2px solid #1e293b;
  padding: 10px;
  overflow-y: auto;
}

.sidebar-item {
  background: #1e293b;
  margin: 5px 0;
  padding: 8px;
  border-radius: 8px;
  cursor: grab;
  text-align: center;
}

/* MAIN AREA */
#gameArea {
  flex: 1;
  position: relative;
}

/* ELEMENTS IN WORLD */
.element {
  position: absolute;
  padding: 10px;
  background: #334155;
  border-radius: 10px;
  cursor: grab;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
}

#log {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 10px;
}
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="gameArea">
  <div id="hud">Discovered: <span id="count">0</span></div>
  <div id="log">Drag from sidebar into the world</div>
</div>

<script>

// ================= COMBINATIONS =================
const combos = {
  "Human+Stone":"Tool",
  "Human+Stick":"Spear",
  "Human+Fire":"Cooking",
  "Fire+Meat":"Cooked Food",
  "Human+Tool":"Hunting",
  "Hunting+Animal":"Meat",
  "Human+Animal":"Domestication",
  "Domestication+Animal":"Livestock",
  "Human+Plant":"Gathering",
  "Gathering+Time":"Farming",
  "Farming+Water":"Agriculture",
  "Agriculture+Human":"Settlement",
  "Settlement+Human":"Village",
  "Village+Time":"City",
  "City+Time":"Civilization",
  "Civilization+Time":"Empire",
  "Human+Human":"Society",
  "Society+Time":"Culture",
  "Culture+Writing":"History",
  "Human+Spear":"Weapon",
  "Weapon+Human":"War",
  "War+Civilization":"Collapse",
  "Human+Thought":"Idea",
  "Idea+Writing":"Knowledge",
  "Knowledge+Time":"Science",
  "Science+Metal":"Technology",
  "Technology+Energy":"Electricity",
  "Electricity+Metal":"Machine",
  "Machine+Human":"Automation",
  "Automation+Society":"Modern Society",
  "Human+Sky":"Curiosity",
  "Curiosity+Science":"Astronomy",
  "Astronomy+Technology":"Space Travel",
  "Space Travel+Human":"Future",
  "Fire+Stone":"Metal",
  "Metal+Tool":"Advanced Tools",
  "Advanced Tools+Human":"Engineering",
  "Engineering+Time":"Industry",
  "Industry+Energy":"Power Grid",
  "Power Grid+Machine":"Factory",
  "Factory+Society":"Urbanization",
  "Urbanization+Time":"Modern City"
};

// =============== START ELEMENTS ===============
const START = [
  "Human","Fire","Water","Stone","Stick",
  "Animal","Plant","Time","Sky","Earth"
];

let discovered = new Set();
let elementsOnScreen = [];

const sidebar = document.getElementById("sidebar");
const gameArea = document.getElementById("gameArea");
const log = document.getElementById("log");
const count = document.getElementById("count");

// =============== SAVE =================
function save() {
  localStorage.setItem("save", JSON.stringify({
    discovered: [...discovered]
  }));
}

function load() {
  const data = JSON.parse(localStorage.getItem("save"));
  if (!data) return false;

  discovered = new Set(data.discovered);
  return true;
}

// =============== UI =================
function updateSidebar() {
  sidebar.innerHTML = "";
  discovered.forEach(el => {
    const div = document.createElement("div");
    div.className = "sidebar-item";
    div.textContent = el;

    div.onmousedown = (e) => spawnElement(el, e.clientX, e.clientY);

    sidebar.appendChild(div);
  });

  count.textContent = discovered.size;
}

// =============== SPAWN =================
function spawnElement(name, x, y) {
  const el = document.createElement("div");
  el.className = "element";
  el.textContent = name;
  el.style.left = x + "px";
  el.style.top = y + "px";

  makeDraggable(el);

  gameArea.appendChild(el);
  elementsOnScreen.push(el);
}

// =============== DRAG =================
let current = null, offsetX=0, offsetY=0;

function makeDraggable(el) {
  el.onmousedown = (e) => {
    current = el;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  };
}

window.onmousemove = (e) => {
  if (!current) return;
  current.style.left = (e.clientX - offsetX) + "px";
  current.style.top = (e.clientY - offsetY) + "px";
};

window.onmouseup = () => {
  if (!current) return;
  checkCombine(current);
  current = null;
};

// =============== COLLISION =================
function collide(a,b){
  const r1=a.getBoundingClientRect();
  const r2=b.getBoundingClientRect();
  return !(r1.right<r2.left||r1.left>r2.right||r1.bottom<r2.top||r1.top>r2.bottom);
}

function checkCombine(el){
  elementsOnScreen.forEach(other=>{
    if(other!==el && collide(el,other)){
      combine(el,other);
    }
  });
}

// =============== COMBINE =================
function combine(aEl,bEl){
  const a=aEl.textContent;
  const b=bEl.textContent;

  const result = combos[a+"+"+b] || combos[b+"+"+a];

  if(!result){
    log.textContent="Nothing happened...";
    return;
  }

  log.textContent="Discovered: "+result;

  if(!discovered.has(result)){
    discovered.add(result);
    updateSidebar();
    save();
  }

  spawnElement(result,
    (aEl.offsetLeft+bEl.offsetLeft)/2,
    (aEl.offsetTop+bEl.offsetTop)/2
  );

  aEl.remove();
  bEl.remove();
  elementsOnScreen = elementsOnScreen.filter(e=>e!==aEl && e!==bEl);
}

// =============== INIT =================
function init(){
  if(!load()){
    START.forEach(e=>discovered.add(e));
  }
  updateSidebar();
}

init();

</script>

</body>
</html>
